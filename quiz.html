<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
</head>
<body>

<h1>SAT Math Quiz</h1>


<br>
h1>SAT Math Quiz</h1>

<form>

<p>1. Solve: 2x + 3 = 7</p>
<input type="radio" name="q1"> x = 1<br>
<input type="radio" name="q1"> x = 2<br>
<input type="radio" name="q1"> x = 3<br>

<p>2. Solve: 5x = 20</p>
<input type="radio" name="q2"> x = 2<br>
<input type="radio" name="q2"> x = 3<br>
<input type="radio" name="q2"> x = 4<br>

<p>3. What is 10% of 50?</p>
<input type="radio" name="q3"> 10<br>
<input type="radio" name="q3"> 5<br>
<input type="radio" name="q3"> 15<br>

<p>4. Solve: x - 4 = 6</p>
<input type="radio" name="q4"> x = 10<br>
<input type="radio" name="q4"> x = 2<br>
<input type="radio" name="q4"> x = 8<br>

<p>5. Solve: 3x + 6 = 15</p>
<input type="radio" name="q5"> x = 3<br>
<input type="radio" name="q5"> x = 9<br>
<input type="radio" name="q5"> x = 6<br>

<br>
<button type="submit">Submit</button>

</form>
<button onclick="check()">Submit</button>

<p id="result"></p>

<script>
function check() {
  let answer = document.querySelector('input[name="q1"]:checked');
  
  if (answer && answer.value == "2") {
    document.getElementById("result").innerText = "Correct!";
  } else {
    document.getElementById("result").innerText = "Try again.";
  }
}
</script>

</body>
</html>
