<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
</head>
<body>

<h1>SAT Math Quiz</h1>

<p>1. Solve: 2x + 3 = 7</p>
<input type="radio" name="q1" value="1"> x = 1<br>
<input type="radio" name="q1" value="2"> x = 2<br>
<input type="radio" name="q1" value="3"> x = 3<br>

<br>

<button onclick="check()">Submit</button>

<p id="result"></p>

<script>
function check() {
  let answer = document.querySelector('input[name="q1"]:checked');
  
  if (answer && answer.value == "2") {
    document.getElementById("result").innerText = "Correct!";
  } else {
    document.getElementById("result").innerText = "Try again.";
  }
}
</script>

</body>
</html>
